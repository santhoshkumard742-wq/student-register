<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Registration Form</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<form action="/register" method="POST" enctype="multipart/form-data" id="internForm">

    <h1>Student Registration Form</h1>

    <!-- Personal Details -->
    <h4>Personal Details</h4>

    <label for="fname">First Name:</label>
    <input type="text" id="fname" name="firstName" placeholder="Enter your first name" required>

    <label for="lname">Last Name:</label>
    <input type="text" id="lname" name="lastName" placeholder="Enter your last name" required>

    <label for="age">Age:</label>
    <input type="number" id="age" name="age" min="18" max="60" placeholder="Enter your Age" required>

    <label for="gender">Gender:</label>
    <select id="gender" name="gender" required>
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Others">Others</option>
    </select>

    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" name="dob" required>

    <!-- Contact Details -->
    <h4>Contact Details</h4>

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" placeholder="Enter your E-mail" required>

    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="Enter your Phone Number" required>

    <label for="address">Address:</label>
    <input type="text" id="address" name="address" placeholder="Enter your Address" required>

    <!-- Academic Details -->
    <h4>Academic Details</h4>

    <label for="education">Education Details:</label>
    <select id="education" name="education" required>
        <option value="">Select Qualification</option>
        <option>B.Sc</option>
        <option>B.Tech</option>
        <option>B.Com</option>
        <option>B.A</option>
        <option>M.Tech</option>
        <option>M.Sc</option>
        <option>MCA</option>
        <option>MBA</option>
        <option>M.A</option>
        <option>B.Ed</option>
        <option>M.Ed</option>
        <option>M.Phil</option>
    </select>

    <label for="department">Department:</label>
    <select id="department" name="department" required>
        <option value="">Select Branch</option>
        <option>EEE</option>
        <option>Computer Science</option>
        <option>ECE</option>
        <option>Mathematics</option>
        <option>Visual Communication</option>
        <option>Physics</option>
        <option>Chemistry</option>
        <option>Bio-Technology</option>
        <option>General</option>
        <option>Accounting & Finance</option>
        <option>English</option>
        <option>Bio Medical Science</option>
    </select>

    <label for="passed">Year Of Passing:</label>
    <input type="number" id="passed" name="passedOutYear" min="2000" max="2035" placeholder="Enter Passed Out Year" required>

    <label for="city">City:</label>
    <input type="text" id="city" name="city" placeholder="Enter your City" required>

    <label for="state">State:</label>
    <input type="text" id="state" name="state" placeholder="Enter your State" required>

    <label for="course">Course Details:</label>
    <select id="course" name="course" required>
        <option value="">Select Course</option>
        <option>Java Full Stack With Angular</option>
        <option>Python With Data Science</option>
        <option>Digital Marketing</option>
        <option>Cloud (AWS)</option>
        <option>Visual Communication</option>
        <option>UI & UX Designer</option>
        <option>HR Marketing</option>
        <option>Photo And Video Editing</option>
    </select>

    <!-- Optional Fields -->
    <h4>Others Optional Fields</h4>

    <label for="photo">Profile Photo:</label>
    <input type="file" id="photo" name="profilePhoto" accept="image/*">

    <label for="idproof">ID Proof Number:</label>
    <input type="text" id="idproof" name="idProofNumber" placeholder="Enter your ID Number">

    <label for="fatherName">Father Name:</label>
    <input type="text" id="fatherName" name="fatherName" placeholder="Enter Your Father Name">

    <label for="parentNumber">Father Phone Number:</label>
    <input type="tel" id="parentNumber" name="fatherPhone" pattern="[0-9]{10}" placeholder="Enter Your Father Phone Number">

    <label for="bloodGroup">Blood Group:</label>
    <input type="text" id="bloodGroup" name="bloodGroup" placeholder="Enter Your Blood Group">

    <button type="submit">Submit</button>

</form>

<script src="./script.js"></script>
</body>
</html>
