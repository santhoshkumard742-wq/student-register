<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Intern Registration Form - Sky Blue 3D</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  --primary-color: #0f172a;
  --primary-hover: #1e293b;
  --background-start: #87ceeb;
  --background-end: #b0e0e6;
  --surface: #ffffff;
  --input-bg: #f1f5f9;
  --border-color: #cbd5e1;
  --focus-shadow: rgba(59,130,246,0.25);
  --text-primary: #0f172a;
  --text-secondary: #64748b;
  --success-green: #22c55e;
  --button-shadow: rgba(15,23,42,0.25);
  --form-shadow-light: rgba(255, 255, 255, 0.6);
  --form-shadow-dark: rgba(0, 0, 0, 0.1);
}

* { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--text-primary);
  min-height: 100vh;
  background: linear-gradient(145deg, var(--background-start), var(--background-end));
  background-size: 400% 400%;
  animation: gradientMove 15s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1 {
  text-align: center;
  font-weight: 700;
  font-size: 36px;
  margin-bottom: 25px;
  color: var(--primary-color);
  text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
}

/* STEP NAVIGATION */
.step-nav {
  display: flex;
  justify-content: space-between;
  position: relative;
  width: 720px;
  max-width: 95%;
  margin: 20px auto 40px auto;
}
.step-nav::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--border-color);
  transform: translateY(-50%);
  z-index: 0;
  border-radius: 2px;
}
.step {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: var(--border-color);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  position: relative;
  z-index: 1;
  box-shadow: 4px 4px 10px var(--form-shadow-dark), -4px -4px 10px var(--form-shadow-light);
  font-size: 18px;
  transition: all 0.3s ease;
}
.step.completed {
  background: var(--success-green);
}
.step.completed::after {
  content: '✔';
  position: absolute;
  font-size: 18px;
  color: #fff;
}
.step.completed span { display: none; }
.step.active { }

form {
  background: var(--surface);
  border-radius: 25px;
  box-shadow: 10px 10px 30px var(--form-shadow-dark),
              -10px -10px 30px var(--form-shadow-light);
  width: 720px;
  max-width: 95%;
  padding: 50px 60px;
  margin-bottom: 60px;
  position: relative;
  transition: transform 0.3s ease;
  background-color: #5cc0e7;
}
form:hover { transform: translateY(-5px); }

h4 {
  color: var(--primary-color);
  font-weight: 600;
  border-bottom: 2px solid var(--border-color);
  padding-bottom: 8px;
  margin-bottom: 28px;
  font-size: 22px;
}

.input-row { display: flex; gap: 28px; margin-bottom: 25px; }
.input-group { flex: 1; display: flex; flex-direction: column; }
.input-group.full-width { flex: 1 1 100%; }
label { margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); font-size: 14px; }

input, select {
  padding: 14px 18px;
  font-size: 16px;
  border: 1.5px solid var(--border-color);
  border-radius: 15px;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
  color: var(--text-primary);
  background: var(--input-bg);
}
input:focus, select:focus {
  outline: none;
  border-color: var(--primary-color);
  box-shadow: 0 0 15px var(--focus-shadow);
}

section { display: none; }
section.active { display: block; }

.button-row {
  display: flex;
  justify-content: space-between;
  margin-top: 35px;
}
label { color: #0f172a; }
button {
  padding: 16px 35px;
  font-size: 18px;
  font-weight: 600;
  border-radius: 40px;
  border: none;
  cursor: pointer;
  color: #fff;
  background-color: var(--primary-color);
  box-shadow: 5px 5px 15px var(--form-shadow-dark),
              -5px -5px 15px var(--form-shadow-light);
  transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
}
button:hover {
  background-color: var(--primary-hover);
  box-shadow: 6px 6px 18px var(--form-shadow-dark),
              -6px -6px 18px var(--form-shadow-light);
  transform: translateY(-2px);
}
button[disabled] { background-color: #9ca3af; cursor: not-allowed; box-shadow: none; transform: none; }

#confirmationMessage {
  display: none;
  background: var(--surface);
  border-radius: 25px;
  box-shadow: 10px 10px 30px var(--form-shadow-dark),
              -10px -10px 30px var(--form-shadow-light);
  width: 720px;
  max-width: 95%;
  padding: 50px 60px;
  margin: 40px 0 60px;
  text-align: center;
  color: var(--success-green);
  font-weight: 700;
  font-size: 24px;
}
#confirmationMessage svg { width: 90px; height: 90px; margin-bottom: 25px; }

@media (max-width: 768px) {
  form, #confirmationMessage { padding: 40px 25px; width: 95%; }
  .input-row { flex-direction: column; }
  button { width: 100%; margin-top: 10px; }
  .button-row { flex-direction: column; gap: 12px; }
  .step-nav { margin-bottom: 35px; }
}

table { width: 100%; border-collapse: collapse; margin-top: 20px; }
table th, table td { padding: 12px 10px; border-bottom: 1px solid var(--border-color); text-align: left; }
table th { width: 35%; }
</style>
</head>
<body>

<h1>Intern Registration Form</h1>

<div class="step-nav">
  <div class="step active"><span>1</span></div>
  <div class="step"><span>2</span></div>
  <div class="step"><span>3</span></div>
  <div class="step"><span>4</span></div>
  <div class="step"><span>5</span></div>
</div>

<form id="multiStepForm" novalidate>
  <!-- PERSONAL -->
  <section id="personal" class="active">
    <h4>Personal Details</h4>
    <div class="input-row">
      <div class="input-group"><label for="fname">First Name:</label><input type="text" id="fname" name="fname" required/></div>
      <div class="input-group"><label for="lname">Last Name:</label><input type="text" id="lname" name="lname" required/></div>
    </div>
    <div class="input-row">
      <div class="input-group"><label for="age">Age:</label><input type="number" id="age" name="age" required min="1" max="150"/></div>
      <div class="input-group"><label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
          <option value="" disabled selected>Select Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="others">Others</option>
        </select>
      </div>
    </div>
    <div class="input-group full-width"><label for="dob">Date of Birth:</label><input type="date" id="dob" name="dob" required /></div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h4>Contact Details</h4>
    <div class="input-group full-width"><label for="email">E-mail:</label><input type="email" id="email" name="email" required/></div>
    <div class="input-group full-width"><label for="phone">Phone Number:</label><input type="tel" id="phone" name="phone" required/></div>
    <div class="input-group full-width"><label for="address">Address:</label><input type="text" id="address" name="address" required/></div>
  </section>

  <!-- ACADEMIC -->
  <section id="academic">
    <h4>Academic Details</h4>
    <div class="input-row">
      <div class="input-group full-width"><label for="college">College/University Name:</label><input type="text" id="college" name="college" required/></div>
    </div>
    <div class="input-row">
      <div class="input-group">
        <label for="education">Course / Qualification:</label>
        <select id="education" name="education" required>
          <option value="" disabled selected>Select Qualification</option>
          <option value="B.Sc">B.Sc</option>
          <option value="B.Tech">B.Tech</option>
          <option value="B.Com">B.Com</option>
          <option value="B.A">B.A</option>
          <option value="BBA">BBA</option>
          <option value="MBA">MBA</option>
          <option value="M.Tech">M.Tech</option>
          <option value="M.Sc">M.Sc</option>
          <option value="M.Com">M.Com</option>
          <option value="M.A">M.A</option>
        </select>
      </div>
      <div class="input-group">
        <label for="department">Department:</label>
        <select id="department" name="department" required>
          <option value="" disabled selected>Select Branch</option>
          <option value="Computer Science">Computer Science</option>
          <option value="EEE">EEE</option>
          <option value="ECE">ECE</option>
          <option value="Mechanical Engineering">Mechanical Engineering</option>
          <option value="Civil Engineering">Civil Engineering</option>
          <option value="Information Technology">Information Technology</option>
          <option value="Chemical Engineering">Chemical Engineering</option>
          <option value="Biotechnology">Biotechnology</option>
        </select>
      </div>
    </div>
    <div class="input-row">
      <div class="input-group"><label for="cgpa">CGPA:</label><input type="number" id="cgpa" name="cgpa" step="0.01" min="0" max="10" required/></div>
      <div class="input-group"><label for="passedout">Year Of Passing:</label><input type="number" id="passedout" name="passedout" placeholder="YYYY" required/></div>
    </div>
  </section>

  <!-- OTHERS -->
  <section id="others">
    <h4>Others</h4>
    <div class="input-group full-width"><label for="photo">Profile Photo:</label><input type="file" id="photo" name="photo" accept="image/*" required/></div>
  </section>

  <!-- REVIEW -->
  <section id="review">
    <h4>Review Your Details</h4>
    <table>
      <tbody>
        <tr><th>Name</th><td id="reviewName"></td></tr>
        <tr><th>Age</th><td id="reviewAge"></td></tr>
        <tr><th>Gender</th><td id="reviewGender"></td></tr>
        <tr><th>Date of Birth</th><td id="reviewDOB"></td></tr>
        <tr><th>Email</th><td id="reviewEmail"></td></tr>
        <tr><th>Phone</th><td id="reviewPhone"></td></tr>
        <tr><th>Address</th><td id="reviewAddress"></td></tr>
        <tr><th>College</th><td id="reviewCollege"></td></tr>
        <tr><th>Course</th><td id="reviewCourse"></td></tr>
        <tr><th>Department</th><td id="reviewDepartment"></td></tr>
        <tr><th>CGPA</th><td id="reviewCGPA"></td></tr>
        <tr><th>Year of Passing</th><td id="reviewYear"></td></tr>
      </tbody>
    </table>
  </section>

  <div class="button-row">
    <button type="button" id="prevBtn" disabled>Previous</button>
    <button type="button" id="nextBtn">Next</button>
  </div>
</form>

<div id="confirmationMessage" aria-live="polite" role="alert" tabindex="0">
  <svg viewBox="0 0 120 120">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#22c55e" stroke-width="10"/>
    <path d="M40 60l15 15 35-35" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div>Your application was successfully submitted.</div>
</div>

<script>
const form = document.getElementById('multiStepForm');
const sections = form.querySelectorAll('section');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const steps = document.querySelectorAll('.step');
let currentStep = 0;

function showStep(step) {
  sections.forEach((sec, idx) => sec.classList.toggle('active', idx === step));
  steps.forEach((s, idx) => s.classList.toggle('active', idx === step));
  prevBtn.disabled = step === 0;
  nextBtn.textContent = step === sections.length - 1 ? 'Submit' : 'Next';
}

// Validate inputs
function validateStep(step) {
  const inputs = sections[step].querySelectorAll('input, select');
  for (const input of inputs) {
    if (!input.checkValidity()) { input.reportValidity(); return false; }
  }
  return true;
}

// Populate review table
function populateReview() {
  document.getElementById('reviewName').textContent = document.getElementById('fname').value + ' ' + document.getElementById('lname').value;
  document.getElementById('reviewAge').textContent = document.getElementById('age').value;
  document.getElementById('reviewGender').textContent = document.getElementById('gender').value;
  document.getElementById('reviewDOB').textContent = document.getElementById('dob').value;
  document.getElementById('reviewEmail').textContent = document.getElementById('email').value;
  document.getElementById('reviewPhone').textContent = document.getElementById('phone').value;
  document.getElementById('reviewAddress').textContent = document.getElementById('address').value;
  document.getElementById('reviewCollege').textContent = document.getElementById('college').value;
  document.getElementById('reviewCourse').textContent = document.getElementById('education').value;
  document.getElementById('reviewDepartment').textContent = document.getElementById('department').value;
  document.getElementById('reviewCGPA').textContent = document.getElementById('cgpa').value;
  document.getElementById('reviewYear').textContent = document.getElementById('passedout').value;
}

// Button events
nextBtn.addEventListener('click', () => {
  if (!validateStep(currentStep)) return;
  steps[currentStep].classList.add('completed');
  if (currentStep === sections.length - 2) populateReview();
  if (currentStep < sections.length - 1) {
    currentStep++;
    showStep(currentStep);
  } else {
    form.style.display = 'none';
    document.getElementById('confirmationMessage').style.display = 'block';
    document.getElementById('confirmationMessage').focus();
  }
});

prevBtn.addEventListener('click', () => {
  if (currentStep > 0) currentStep--;
  showStep(currentStep);
});

showStep(currentStep);
</script>

</body>
</html>
