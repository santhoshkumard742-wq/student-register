<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="student.css">
</head>
<body>
    <form action="">
        <div>
            <h1>Intern Registration Form</h1>
            <h4>Personal Details </h4>
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="fname" placeholder="Enter your first name" required>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname" placeholder="Enter your last name" required><br>
            <br>
            <label for="age">Age:</label>
            <input type="text" id="age" name="age" placeholder="Enter your Age" required><br>
            <br>
          <label for="">Gender:</label>
           <select required>
             <option value=""></option>
             <option>Male</option>
             <option>Female</option>
             <option>Others</option>
             </select>
            <br>
             <br>
             
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob"><br>
            <br>
            <h4>Contact Details</h4>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="Enter your E-mail"required><br>
            <br>
            
             <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your Phone Number" required><br>
            <br>
            <label for="address">Address:</label>
            <input type="text" id="address" name="address" placeholder="Enter your Address" required><br>
            <br>

            <h4>Academic Details</h4>
         <label for="Education">Education Details:</label>
         <select required>
            <option value="">Select Qualification</option>
            <option>B.Sc </option>
            <option>B.Tech </option>
            <option>B.Com </option>
            <option>B.Sc </option>
            <option>B.A </option>
            <option>M.Tech </option>
            <option>M.Sc </option>
             <option>MCA</option>
            <option>MBA</option>
            <option>M.A</option>
            <option>B.Ed</option>
            <option>M.Ed</option>
            <option>M.Phil</option>
         </select>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
         <label for="department">Department:</label>
         <select required>
            <option value="">Branch</option>
            <option>EEE </option>
            <option>Computer Science</option>
            <option>ECE</option>
            <option>Mathematics </option>
            <option>Visual communicatio</option>
            <option>Physics </option>
            <option>Chemistry</option>
            <option>Bio-Technology</option>
             <option>General</option>
            <option>Accounting&Finance</option>
            <option>English</option>
            <option>Bio Medical Science</option>
            
         </select>
         <br>
         <br>
         <label for=passedout>Year Of Passing:</label>
            <input type="number" id="passed" name="passedout" placeholder="Enter Passed Out Year" required><br>

         <br>
         
             <label for=city>City:</label>
            <input type="text" id="city" name="city" placeholder="Enter your City" required>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
             <label for=state>State:</label>
            <input type="text" id="state" name="state" placeholder="Enter your State" required><br>
            <br>
           

             <label for="course">Course Details:</label>
         <select required>
            <option value="">Select Course</option>
            <option>Java Full Stack With Angular</option>
            <option>Python With DataScience </option>
            <option>Digital Marketing</option>
            <option>Cloud(AWS) </option>
            <option>Visual Communication</option>
            <option>UI&UX Designer </option>
            <option> HR Marketing</option>
            <option>Photo And Video Editing </option>
         </select>
         <br>
         <br>
         <h4>Others Optional Fields</h4>
         <label for="photo">Profile Photo:</label>
            <input type="file" ><br>
            <br>
             <label for="idproof">ID Proof Number:</label>
            <input type="number" id="idproof" name="idproof" placeholder="Enter your ID Number" ><br>
            <br>
            <label for="Fathername">Father Name:</label>
            <input type="text" id="Fathername"  placeholder="Enter Your Father Name"><br> 
            <br>
           <label for="ParentNumber">Father Phone Number:</label>
            <input type="text" id="ParentNumber"  placeholder="Enter Your Father Phone Number"><br>  
            <br>
             <label for="BloodGroup">Blood Group:</label>
            <input type="text" id="BloodGroup"  placeholder="Enter Your Blood Group "><br>  
            <br>
         <button type="button">Submit</button>
         

              
              










        </div>
    </form>
</body>
</html>
